<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walid's Journal</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

    <style>
      /* ── Page loader ── */
      #page-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #080e1c;
        display: flex;
        flex-direction: column;
      }

      .pl-center {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .pl-journal-name {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: clamp(0.6rem, 1.4vw, 0.75rem);
        font-weight: 600;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.22);
        margin: 0 0 2.2rem;
      }

      .pl-count-row {
        display: flex;
        align-items: baseline;
        line-height: 1;
      }

      #pl-num {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: clamp(7rem, 20vw, 13rem);
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.04em;
        line-height: 1;
        min-width: 3ch;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .pl-sym {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: clamp(2rem, 5vw, 4rem);
        font-weight: 300;
        color: rgba(255,255,255,0.18);
        margin-left: 0.12em;
        align-self: flex-start;
        margin-top: 0.45em;
      }

      .pl-bottom { position: relative; }

      .pl-bottom-labels {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2rem 0.65rem;
      }

      .pl-bottom-name {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 0.58rem;
        font-weight: 600;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.16);
      }

      #pl-pct {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 0.58rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: rgba(255,255,255,0.16);
        font-variant-numeric: tabular-nums;
      }

      .pl-track {
        width: 100%;
        height: 2px;
        background: rgba(255,255,255,0.06);
      }

      #pl-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          to right,
          hsl(213,85%,60%),
          hsl(240,75%,65%),
          hsl(258,75%,68%)
        );
        transition: none;
      }

      /*
       * ── Blur-to-clear reveal ─────────────────────────────────────
       *
       * Using a CSS CLASS on #root (not an inline style) because
       * React 19's createRoot() clears inline styles on its container
       * but leaves class attributes alone.
       *
       * The transition is on plain #root (no class) so it stays active
       * even after .page-loading is removed — that's what makes the
       * smooth fade work when classList.remove() is called.
       * ────────────────────────────────────────────────────────────
       */
      #root {
        transition: filter 1.2s ease-out;
      }
      #root.page-loading {
        filter: blur(6px);
      }
      @media (prefers-reduced-motion: reduce) {
        #root { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="page-loader" aria-hidden="true">
      <div class="pl-center">
        <p class="pl-journal-name">Walid&rsquo;s Journal</p>
        <div class="pl-count-row">
          <span id="pl-num">0</span>
          <span class="pl-sym">%</span>
        </div>
      </div>

      <div class="pl-bottom">
        <div class="pl-bottom-labels">
          <span class="pl-bottom-name">Loading</span>
          <span id="pl-pct">0%</span>
        </div>
        <div class="pl-track">
          <div id="pl-bar-fill"></div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var numEl = document.getElementById('pl-num');
        var pctEl = document.getElementById('pl-pct');
        var barEl = document.getElementById('pl-bar-fill');

        var DELAY = 50;   /* ms before counter starts     */
        var DUR   = 700;  /* ms for counter to reach 100  */
        var t0    = null;

        /* ── clearBlur ─────────────────────────────────────────────
         * Removes .page-loading from #root, triggering the CSS
         * transition that fades filter from blur → none.
         * Safe to call multiple times (guarded by `cleared` flag).
         * ────────────────────────────────────────────────────────── */
        var cleared = false;
        function clearBlur() {
          if (cleared) return;
          cleared = true;
          clearTimeout(safetyTimer);
          var root = document.getElementById('root');
          if (root) root.classList.remove('page-loading');
        }

        /* Safety net: guarantee the blur clears even if rAF stalls
           (e.g. page opened in a background tab). Fires at 2 s. */
        var safetyTimer = setTimeout(clearBlur, 2600);

        /* piecewise ease: fast burst → crawl → fast finish */
        function ease(t) {
          if (t <= 0.16) return (t / 0.16) * 0.55;
          if (t <= 0.38) return 0.55 + ((t - 0.16) / 0.22) * 0.12;
          if (t <= 0.58) return 0.67 + ((t - 0.38) / 0.20) * 0.07;
          if (t <= 0.74) return 0.74 + ((t - 0.58) / 0.16) * 0.06;
          if (t <= 0.87) return 0.80 + ((t - 0.74) / 0.13) * 0.11;
          return           0.91 + ((t - 0.87) / 0.13) * 0.09;
        }

        function tick(now) {
          if (t0 === null) t0 = now;
          var elapsed = now - t0;

          if (elapsed >= DELAY) {
            var t   = Math.min((elapsed - DELAY) / DUR, 1);
            var pct = ease(t) * 100;
            var val = Math.round(pct);

            if (numEl) numEl.textContent = val;
            if (pctEl) pctEl.textContent = val + '%';
            if (barEl) barEl.style.width = pct.toFixed(2) + '%';

            if (t >= 1) {
              /* Fade out the loader overlay */
              var loader = document.getElementById('page-loader');
              if (loader) {
                loader.style.transition    = 'opacity 0.4s ease-out';
                loader.style.opacity       = '0';
                loader.style.pointerEvents = 'none';
                setTimeout(function () {
                  if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
                }, 420);
              }

              /* Kick off the blur-to-clear transition AFTER the loader has
                 fully faded and been removed (~440 ms). This ensures the
                 blurred content is actually visible to the user before the
                 blur starts clearing — otherwise the dark overlay masks the
                 effect entirely and the transition goes unseen. */
              setTimeout(clearBlur, 440);
              return;
            }
          }

          requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
      })();
    </script>

    <div id="root" class="page-loading"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
